<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sign Sense — ASL Recognition{% endblock %}</title>
  <meta name="description" content="{% block description %}Live ASL recognition in the browser: fingerspelling, single-sign classification, and multi-word transcripts from your camera.{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=20260416-ux-2">
  <script src="/static/app.js?v=20260416-ux-2" defer></script>
</head>
<body data-page="{{ page | default('home') }}">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="backdrop" aria-hidden="true">
    <div class="backdrop-glow backdrop-glow-one"></div>
    <div class="backdrop-glow backdrop-glow-two"></div>
    <div class="backdrop-glow backdrop-glow-three"></div>
  </div>

  <div id="health-banner" class="health-banner" role="alert" hidden></div>

  <header class="site-nav">
    <a href="/" class="brand" aria-label="Sign Sense home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="brand-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#d8b4fe"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <path d="M8 20V10a2 2 0 1 1 4 0v6M12 16V8a2 2 0 1 1 4 0v8M16 16V9a2 2 0 1 1 4 0v9M20 18v-5a2 2 0 1 1 4 0v9a6 6 0 0 1-6 6h-2a6 6 0 0 1-5.66-4L8 20Z" stroke="url(#brand-grad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">Sign Sense</span>
        <span class="brand-tag">ASL recognition</span>
      </span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="/letters" class="nav-link {% if page == 'letters' %}is-active{% endif %}"{% if page == 'letters' %} aria-current="page"{% endif %}>
        <span class="nav-link-title">Letters</span>
        <span class="nav-link-sub">fingerspelling</span>
      </a>
      <a href="/words" class="nav-link {% if page == 'words' %}is-active{% endif %}"{% if page == 'words' %} aria-current="page"{% endif %}>
        <span class="nav-link-title">Words</span>
        <span class="nav-link-sub">single sign</span>
      </a>
      <a href="/sequence" class="nav-link {% if page == 'sequence' %}is-active{% endif %}"{% if page == 'sequence' %} aria-current="page"{% endif %}>
        <span class="nav-link-title">Sequence</span>
        <span class="nav-link-sub">multi-word</span>
      </a>
    </nav>
  </header>

  <main id="main-content" class="page-main">
    {% block content %}{% endblock %}
  </main>

  <footer id="model-info-footer" class="site-footer" aria-live="polite">
    <div class="footer-left">
      <span class="footer-brand">Sign Sense</span>
      <span class="footer-dot" aria-hidden="true">·</span>
      <span class="footer-meta">Browser-native · CPU inference · Your camera stays local</span>
    </div>
    <span id="model-info-text" class="model-info-text"></span>
  </footer>
</body>
</html>
