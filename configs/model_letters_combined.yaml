dataset:
  name: combined/grassknoted+danrasband
  root_dir: data/processed
  train_subdir: .
  accepted_labels:
    - A
    - B
    - C
    - D
    - E
    - F
    - G
    - H
    - I
    - K
    - L
    - M
    - N
    - O
    - P
    - Q
    - R
    - S
    - T
    - U
    - V
    - W
    - X
    - Y
    - NOTHING

merge:
  input_csvs:
    - data/processed/asl_letters_landmarks.csv
    - data/processed/asl_letters_cross_dataset.csv

features:
  output_csv: data/processed/asl_letters_combined.csv

training:
  backend: auto
  device: auto
  model_output_path: models/letters/asl_letters_combined_random_forest.joblib
  metrics_output_path: reports/letters/asl_letters_combined_train_metrics.json
  test_size: 0.2
  random_state: 42
  n_estimators: 500
  class_weight: balanced_subsample
  max_depth: 10
  learning_rate: 0.1
  subsample: 0.9
  colsample_bytree: 0.9
