dataset:
  name: msasl_words_50
  root_dir: data/raw/msasl/MS-ASL
  manifest_output_path: data/processed/msasl_words_50_manifest.csv
  max_samples_per_split:
    train: 80
    val: 0
    test: 0

download:
  raw_video_dir: data/raw/msasl/videos

features:
  output_csv: data/processed/msasl_words_50_features.csv
  sequence_length: 12
  delegate: auto

training:
  model_output_path: models/words/msasl_words_random_forest.joblib
  metrics_output_path: reports/words/msasl_words_metrics.json
  n_estimators: 400
  random_state: 42
  class_weight: balanced_subsample
  test_size: 0.2
  select_top_k_features: 300
