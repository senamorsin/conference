dataset:
  name: words_combined
  sources:
    - features_csv: data/processed/msasl_words_50_features.csv
      use_splits: [train, val]
    - features_csv: data/processed/asl_citizen_words_features.csv
      use_splits: [train, val]
  test_sources:
    - features_csv: data/processed/msasl_words_50_features.csv
      use_splits: [test]
    - features_csv: data/processed/asl_citizen_words_features.csv
      use_splits: [test]

features:
  sequence_length: 12

training:
  model_output_path: models/words/combined_words_random_forest.joblib
  metrics_output_path: reports/words/combined_words_metrics.json
  n_estimators: 400
  random_state: 42
  class_weight: balanced_subsample
  test_size: 0.2
  select_top_k_features: 300
