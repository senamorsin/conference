dataset:
  name: grassknoted/asl-alphabet
  root_dir: data/raw/asl-alphabet
  train_subdir: asl_alphabet_train
  accepted_labels:
    - A
    - B
    - C
    - D
    - E
    - F
    - G
    - H
    - I
    - K
    - L
    - M
    - N
    - O
    - P
    - Q
    - R
    - S
    - T
    - U
    - V
    - W
    - X
    - Y
    - NOTHING

features:
  output_csv: data/processed/asl_letters_landmarks.csv
  max_images_per_class: null
  min_detection_confidence: 0.5
  delegate: auto

training:
  backend: auto
  device: auto
  model_output_path: models/letters/asl_letters_random_forest.joblib
  metrics_output_path: reports/letters/asl_letters_metrics.json
  test_size: 0.2
  random_state: 42
  n_estimators: 300
  class_weight: balanced_subsample
  max_depth: 10
  learning_rate: 0.1
  subsample: 0.9
  colsample_bytree: 0.9
